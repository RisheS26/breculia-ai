<style>
/* ── TOKENS (Apple-inspired premium dark theme) ── */
:root{
  --bg:#000000;--bg2:#111111;--bg3:#1c1c1e;--bg4:#2c2c2e;
  --border:#2c2c2e;--border2:#3a3a3c;
  --green:#22c55e;--green2:#16a34a;
  --glow:rgba(34,197,94,0.12);--glow2:rgba(34,197,94,0.06);
  --white:#f5f5f7;
  --text:#a1a1a6;
  --muted:#636366;
  --badge-bg:#22c55e;--badge-fg:#000000;
  --red:#ff453a;
  --fh:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',Arial,sans-serif;
  --fb:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif;
  color-scheme:dark;
}
html.light{
  --bg:#ffffff;--bg2:#fafafa;--bg3:#f5f5f7;--bg4:#e8e8ed;
  --border:#e5e5e7;--border2:#d1d1d6;
  --green:#22c55e;--green2:#16a34a;
  --glow:rgba(34,197,94,0.14);--glow2:rgba(34,197,94,0.07);
  --white:#1d1d1f;--text:#6e6e73;--muted:#a1a1aa;
  --badge-bg:#22c55e;--badge-fg:#ffffff;
  --red:#dc2626;
  color-scheme:light;
}

/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:17px;scroll-padding-top:52px}
body{background:var(--bg);color:var(--white);font-family:var(--fb);font-weight:400;line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
ul{list-style:none}
::selection{background:rgba(34,197,94,0.25);color:#fff}

footer a{color:var(--text);text-decoration:underline;text-decoration-color:transparent;transition:color 0.2s,text-decoration-color 0.2s}
footer a:hover{color:var(--green);text-decoration-color:var(--green)}

/* ── LAYOUT ── */
.wrap{max-width:1080px;margin:0 auto;padding:0 24px}
@media(min-width:800px){.wrap{padding:0 40px}}
@media(min-width:1100px){.wrap{padding:0 48px}}
section{padding:120px 0;position:relative}
section+section{border-top:1px solid var(--border)}

/* ── TYPOGRAPHY ── */
.label{display:inline-flex;align-items:center;gap:8px;
  font-family:'Caveat',cursive;font-size:1.05rem;font-weight:700;
  letter-spacing:0.06em;color:var(--green);margin-bottom:20px}
.label::before{content:'';width:22px;height:2px;background:var(--green);border-radius:1px;flex-shrink:0}
h1{font-family:var(--fh);font-size:clamp(2.8rem,8vw,6rem);font-weight:800;
  line-height:1.02;letter-spacing:-0.025em;color:var(--white);
  min-height:3lh;contain:layout}
h2{font-family:var(--fh);font-size:clamp(2rem,5vw,3.6rem);font-weight:700;
  line-height:1.06;letter-spacing:-0.02em;color:var(--white)}
h3{font-size:1.1rem;font-weight:600;color:var(--white);line-height:1.35}
p{color:var(--text);line-height:1.75}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:15px 32px;font-family:var(--fb);font-size:0.95rem;font-weight:600;
  letter-spacing:0.01em;border-radius:40px;cursor:pointer;
  transition:background 0.22s,transform 0.22s,box-shadow 0.22s,opacity 0.22s;
  border:none;line-height:1;text-decoration:none}
.btn-primary{background:var(--green);color:#000000}
.btn-primary:hover{background:var(--green2);transform:translateY(-1px);box-shadow:0 6px 24px var(--glow)}
.btn-primary:active{transform:translateY(0)}
html.light .btn-primary{background:var(--green);color:#ffffff}
html.light .btn-primary:hover{background:var(--green2)}
.btn-ghost{background:transparent;color:var(--white);border:1.5px solid rgba(255,255,255,0.2)}
.btn-ghost:hover{border-color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.05)}
html.light .btn-ghost{color:var(--white);border-color:rgba(29,29,31,0.2)}
html.light .btn-ghost:hover{border-color:rgba(29,29,31,0.5);background:rgba(0,0,0,0.04)}
.btn-full{width:100%}
.btn-lg{padding:18px 40px;font-size:1rem}
.cta-note{display:block;font-size:0.74rem;color:var(--muted);margin-top:10px;text-align:center}

/* ── NAV ── */
#nav{position:sticky;top:0;z-index:900;background:rgba(0,0,0,0.82);
  backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid rgba(255,255,255,0.08);padding:0;
  contain:layout style}
html.light #nav{background:rgba(245,245,247,0.85);border-bottom-color:rgba(0,0,0,0.08)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;gap:12px;height:52px}
.nav-logo{font-family:var(--fh);font-size:1.1rem;font-weight:700;letter-spacing:-0.01em;
  color:var(--white);display:flex;align-items:center;gap:8px}
.nav-dot{width:7px;height:7px;border-radius:50%;background:var(--green);
  box-shadow:0 0 8px var(--green);animation:pulse 1.6s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:0.6}}
.nav-badge{font-family:var(--fb);font-size:0.75rem;font-weight:600;
  background:rgba(34,197,94,0.12);color:var(--green);
  padding:6px 14px;border-radius:20px;letter-spacing:0.01em;white-space:nowrap;
  border:1px solid rgba(34,197,94,0.25);
  transition:background 0.2s,transform 0.2s;display:inline-flex;align-items:center}
.nav-badge:hover{background:rgba(34,197,94,0.22);transform:translateY(-1px)}
html.light .nav-badge{background:rgba(29,158,68,0.08);color:var(--green);border-color:rgba(29,158,68,0.25)}
.nav-right{display:flex;align-items:center;gap:12px}
.theme-btn{width:40px;height:24px;border-radius:12px;background:var(--bg3);
  border:1.5px solid var(--border2);cursor:pointer;position:relative;
  -webkit-appearance:none;appearance:none;outline:none;transition:border-color 0.2s;flex-shrink:0}
.theme-btn:hover{border-color:var(--green)}
.theme-btn:focus-visible{outline:2px solid var(--green);outline-offset:2px}
.theme-btn .knob{width:18px;height:18px;border-radius:50%;background:var(--green);
  position:absolute;top:50%;left:2px;transform:translateY(-50%);
  transition:left 0.3s cubic-bezier(0.68,-0.3,0.32,1.3)}
html.light .theme-btn .knob{left:18px}

/* ── TOAST ── */
.s-toast{position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-16px);
  z-index:9997;background:var(--green);color:#000;font-size:0.8rem;font-weight:700;
  padding:10px 22px;border-radius:40px;box-shadow:0 8px 32px var(--glow);
  opacity:0;pointer-events:none;transition:opacity 0.4s,transform 0.4s;white-space:nowrap}
.s-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── HERO ── */
#hero{padding:0;border-top:none;min-height:100svh;display:flex;flex-direction:column}
.hero-top{padding:80px 0 64px;flex:1}

@media(min-width:720px){
  .hero-top .wrap{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;min-height:500px}
  .phone-wrap{display:block;min-width:260px;min-height:420px}
}
.phone-wrap{display:none}

.hero-kicker{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.kicker-dot{width:7px;height:7px;border-radius:50%;background:var(--green);
  box-shadow:0 0 8px var(--green);animation:pulse 1.6s infinite;flex-shrink:0}
.kicker-text{font-size:0.7rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--green)}
html.light .kicker-text{color:var(--green)}

.hero-sub{font-size:clamp(1rem,2.2vw,1.15rem);max-width:540px;line-height:1.75;
  margin:24px 0 36px;color:var(--text)}

.hero-ctas{display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin-bottom:36px}
.hero-proof{display:flex;flex-wrap:wrap;gap:18px;align-items:center}
.proof-item{display:flex;align-items:center;gap:7px;font-size:0.82rem;color:var(--text)}
.pi-check{color:var(--green);font-size:0.85rem;font-weight:700;flex-shrink:0}

/* Stats bar */
.hero-card-row{background:var(--bg2);border-top:1px solid var(--border);padding:0}
.hero-card-inner{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.hero-card-inner::-webkit-scrollbar{display:none}
.hc-item{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;
  padding:22px 28px;text-align:center;border-right:1px solid var(--border);min-width:120px}
.hc-item:last-child{border-right:none}
.hc-num{font-family:var(--fh);font-size:1.8rem;font-weight:700;color:var(--green);line-height:1;letter-spacing:-0.02em}
.hc-label{font-size:0.7rem;color:var(--text);margin-top:4px;line-height:1.4;max-width:100px}

/* ── PHONE WIDGET ── */
.phone-frame{background:#0e0e0e;border:1.5px solid #3a3a3a;border-radius:34px;padding:14px;
  max-width:280px;margin:0 auto;
  box-shadow:0 0 60px rgba(34,197,94,0.08),0 24px 60px rgba(0,0,0,0.6)}
html.light .phone-frame{background:#1a1a1a;border-color:#555}
.phone-notch{width:90px;height:22px;background:#000;border-radius:0 0 14px 14px;margin:0 auto 12px;position:relative}
.phone-notch::after{content:'';position:absolute;top:6px;left:50%;transform:translateX(-50%);width:36px;height:5px;border-radius:3px;background:#1a1a1a}
.phone-screen{background:#050505;border-radius:20px;overflow:hidden}
html.light .phone-screen{background:#050505}
.wa-hdr{background:#075e54;padding:12px 14px;display:flex;align-items:center;gap:8px}
.wa-av{width:28px;height:28px;border-radius:50%;background:var(--green);
  display:flex;align-items:center;justify-content:center;font-size:0.55rem;font-weight:700;color:#000;flex-shrink:0}
.wa-nm{font-size:0.78rem;font-weight:600;color:#fff}
.wa-live{margin-left:auto;font-size:0.5rem;background:var(--green);color:#000;
  padding:2px 6px;border-radius:5px;font-weight:700;display:flex;align-items:center;gap:3px}
.wa-ld{width:4px;height:4px;border-radius:50%;background:#000;animation:pulse 1.2s infinite}
.wa-body{padding:14px 11px 16px}
.wa-time{font-size:0.56rem;color:#888;text-align:center;margin-bottom:10px}
.wa-bubble{background:#1a2e1a;border:1px solid #1e3a1e;border-radius:0 14px 14px 14px;padding:12px}
.wa-bubble p{font-size:0.74rem;color:#ddd;line-height:1.5;margin:0}
.wa-ts{font-size:0.5rem;color:#888;text-align:right;margin-top:5px}

/* ── PROBLEM ── */
#problem{background:var(--bg2)}
.problem-grid{display:grid;grid-template-columns:1fr;gap:16px;margin-top:48px}
@media(min-width:640px){.problem-grid{grid-template-columns:repeat(3,1fr)}}
.prob-item{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:32px 28px;text-align:center;
  transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.35s ease}
.prob-item:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,0.3)}
.prob-num{font-family:var(--fh);font-size:clamp(2.6rem,6.5vw,4rem);font-weight:800;color:var(--green);line-height:1;margin-bottom:10px;letter-spacing:-0.02em}
.prob-desc{font-size:0.88rem;color:var(--text);line-height:1.55}
.problem-callout{margin-top:32px;padding:22px 28px;background:rgba(255,69,58,0.05);
  border:1px solid rgba(255,69,58,0.14);border-left:3px solid var(--red);border-radius:16px;
  font-size:0.93rem;color:var(--text);line-height:1.65}
.problem-callout strong{color:#ff6961}

/* ── DEMO ── */
#demo{background:var(--bg)}
.chat-wrap{max-width:480px;margin:40px auto 0;background:var(--bg3);
  border:1px solid var(--border2);border-radius:22px;overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,0.4)}
.chat-hdr{background:var(--bg4);padding:15px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.chat-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 1.6s infinite}
.chat-hdr-txt{font-size:0.85rem;font-weight:600;color:var(--white)}
.chat-hdr-sub{font-size:0.62rem;color:var(--muted)}
.chat-body{padding:18px 15px}
.msg{margin-bottom:14px;display:flex}
.msg-ai{justify-content:flex-start}.msg-cust{justify-content:flex-end}
.bubble{padding:10px 15px;max-width:82%;border-radius:16px}
.msg-ai .bubble{background:var(--bg4);border-radius:4px 16px 16px 16px}
.msg-cust .bubble{background:rgba(34,197,94,0.12);border-radius:16px 4px 16px 16px}
html.light .msg-ai .bubble{background:#e8e8ed}
html.light .msg-cust .bubble{background:#d1fae5}
.bubble p{font-size:0.82rem;color:var(--white);line-height:1.5;margin:0}
html.light .bubble p{color:#1d1d1f}
.ts{font-size:0.56rem;color:var(--muted);margin-top:4px;display:block}
.chat-result{margin:14px 15px 15px;background:rgba(34,197,94,0.08);
  border:1px solid rgba(34,197,94,0.2);border-radius:12px;padding:12px 16px;
  text-align:center;font-size:0.82rem;color:var(--green);font-weight:600}
.demo-note{text-align:center;margin-top:18px;font-size:0.84rem;color:var(--muted)}

/* ── MATH ── */
#math{background:var(--bg2)}
.math-grid{display:grid;grid-template-columns:1fr;gap:0;
  border:1px solid var(--border);border-radius:22px;overflow:hidden;margin-top:48px}
@media(min-width:500px){.math-grid{grid-template-columns:1fr 1fr}}
.math-cell{padding:40px 36px}
.math-cell:first-child{border-bottom:1px solid var(--border)}
@media(min-width:500px){.math-cell:first-child{border-bottom:none;border-right:1px solid var(--border)}}
.math-lbl{font-size:0.68rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.math-num{font-family:var(--fh);font-size:clamp(2rem,5vw,3.2rem);font-weight:800;line-height:1;margin-bottom:10px;letter-spacing:-0.02em}
.math-num.loss{color:#ff6961}
.math-num.gain{color:var(--green)}
.math-desc{font-size:0.88rem;color:var(--text);line-height:1.65}
.math-conclusion{margin-top:24px;background:var(--glow2);
  border:1px solid rgba(34,197,94,0.15);border-left:3px solid var(--green);
  border-radius:16px;padding:22px 28px}
.math-conclusion p{font-size:0.95rem;color:var(--white);margin:0;line-height:1.7}
.math-conclusion strong{color:var(--green)}

/* ── ROI CALC ── */
#roi{background:var(--bg)}
.calc-wrap{margin-top:40px;background:var(--bg2);border:1px solid var(--border);border-radius:22px;overflow:hidden}
.calc-grid{display:grid;grid-template-columns:1fr}
@media(min-width:640px){.calc-grid{grid-template-columns:1fr 1fr}}
.calc-inputs{padding:32px;border-bottom:1px solid var(--border)}
@media(min-width:640px){.calc-inputs{border-bottom:none;border-right:1px solid var(--border)}}
.calc-results{padding:32px;background:var(--bg3)}
.calc-title{font-size:0.7rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:20px}
.input-row{margin-bottom:20px}
.input-row label{display:flex;justify-content:space-between;align-items:center;
  font-size:0.84rem;color:var(--text);margin-bottom:8px}
.input-row label span{font-weight:700;color:var(--green)}
input[type=range]{width:100%;height:4px;border-radius:2px;background:var(--border2);
  outline:none;-webkit-appearance:none;cursor:pointer}
input[type=range]:focus-visible{outline:2px solid var(--green);outline-offset:4px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;
  border-radius:50%;background:var(--green);cursor:pointer}
input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;
  background:var(--green);cursor:pointer;border:none}
.range-ends{display:flex;justify-content:space-between;font-size:0.65rem;color:var(--muted);margin-top:4px}
.result-card{background:var(--bg4);border:1px solid var(--border2);border-radius:14px;padding:18px 20px;margin-bottom:12px}
.result-card:last-of-type{margin-bottom:0}
.result-lbl{font-size:0.7rem;color:var(--muted);margin-bottom:4px}
.result-val{font-family:var(--fh);font-size:2rem;font-weight:700;line-height:1;color:var(--green);letter-spacing:-0.02em}
.result-sub{font-size:0.67rem;color:var(--muted);margin-top:4px}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.result-sm .result-val{font-size:1.4rem}
.calc-cta{margin-top:16px}

/* ── COMPARE ── */
#compare{background:var(--bg2)}
.comp-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-top:40px;
  border-radius:18px;border:1px solid var(--border)}
table.comp{width:100%;border-collapse:collapse;min-width:480px;font-size:0.86rem}
.comp thead th{padding:15px 18px;text-align:left;font-size:0.68rem;font-weight:700;
  letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);background:var(--bg3);
  border-bottom:2px solid var(--border)}
.comp thead th.us{color:var(--green)}
.comp thead th:not(:last-child){border-right:1px solid var(--border)}
.comp tbody td{padding:14px 18px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
.comp tbody td:not(:last-child){border-right:1px solid var(--border)}
.comp tbody td.us{color:var(--white);font-weight:500;background:rgba(34,197,94,0.04)}
.comp tbody tr:last-child td{border-bottom:none}
.comp .ck{color:#4ade80}
.comp .cx{color:var(--muted)}
.comp-tag{display:inline-flex;font-size:0.65rem;font-weight:700;
  background:var(--green);color:#000;padding:2px 8px;border-radius:10px;margin-left:5px;vertical-align:middle}
html.light .comp-tag{color:#fff}
.comp-note{margin-top:18px;font-size:0.86rem;color:var(--text);line-height:1.7;
  padding-left:16px;border-left:2px solid var(--border2)}
.comp-note strong{color:var(--green)}

/* ── HOW IT WORKS ── */
#how{background:var(--bg)}
.steps{display:flex;flex-direction:column;margin-top:40px}
.step{display:flex;gap:22px;padding:28px 0;border-bottom:1px solid var(--border)}
.step:last-child{border-bottom:none}
.step-num{flex-shrink:0;width:42px;height:42px;border-radius:50%;background:var(--bg3);
  border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;
  font-family:var(--fh);font-size:1rem;font-weight:700;color:var(--green);margin-top:2px}
.step-body h3{margin-bottom:7px}
.step-body p{font-size:0.88rem}
.step-time{display:inline-flex;font-size:0.68rem;font-weight:700;
  background:var(--glow);color:var(--green);padding:3px 9px;border-radius:6px;
  margin-top:10px;letter-spacing:0.08em}

/* ── PRICING ── */
#pricing{background:var(--bg2)}
.pricing-center{max-width:520px;margin:0 auto}
.price-card{background:var(--bg);border:1px solid rgba(34,197,94,0.4);border-radius:24px;
  padding:36px;position:relative;margin-top:40px;
  box-shadow:0 0 0 1px rgba(34,197,94,0.1),0 24px 60px rgba(0,0,0,0.4)}
.price-glow{position:absolute;inset:-1px;border-radius:24px;
  background:linear-gradient(135deg,rgba(34,197,94,0.07),transparent 60%);pointer-events:none}
.price-badge{position:absolute;top:-13px;right:22px;background:var(--green);
  color:#000;font-size:0.68rem;font-weight:700;padding:5px 14px;border-radius:20px;letter-spacing:0.04em}
html.light .price-badge{color:#fff}
.price-tier{font-size:0.7rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.price-amt{font-family:var(--fh);font-size:3rem;font-weight:800;line-height:1;color:var(--white);margin-bottom:5px;letter-spacing:-0.02em}
.price-amt span{font-family:var(--fb);font-size:1rem;font-weight:400;color:var(--text)}
.price-ann{font-size:0.88rem;color:var(--green);font-weight:600;margin-bottom:14px}
.price-setup{font-size:0.9rem;color:var(--text);margin-bottom:5px}
.price-mins{font-size:0.86rem;color:var(--muted);margin-bottom:26px}
.price-feats{margin-bottom:26px}
.price-feats li{font-size:0.9rem;color:var(--text);padding:10px 0;
  padding-left:22px;position:relative;border-bottom:1px solid var(--border)}
.price-feats li:last-child{border-bottom:none}
.price-feats li::before{content:'✓';position:absolute;left:0;color:var(--green);font-weight:700}
.roi-note{text-align:center;margin-top:22px;font-size:0.9rem;color:var(--green);font-weight:600}

/* ── FAQ ── */
#faq{background:var(--bg)}
.faq-list{margin-top:36px;border:1px solid var(--border);border-radius:22px;overflow:hidden}
.faq-item{border-bottom:1px solid var(--border)}
.faq-item:last-child{border-bottom:none}
.faq-q{width:100%;background:none;border:none;padding:22px 28px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  text-align:left;cursor:pointer;transition:background 0.2s}
.faq-q:hover{background:var(--glow2)}
.faq-q:focus-visible{outline:2px solid var(--green);outline-offset:-2px}
.faq-q-text{font-size:0.95rem;font-weight:500;color:var(--white);line-height:1.4}
.faq-icon{flex-shrink:0;width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);font-size:0.9rem;transition:all 0.22s;
  min-width:22px;min-height:22px}
.faq-item.open .faq-icon{border-color:var(--green);color:var(--green);transform:rotate(45deg)}
.faq-a{max-height:0;overflow:hidden;transition:max-height 0.35s ease}
.faq-item.open .faq-a{max-height:400px}
.faq-a-inner{padding:0 28px 22px;font-size:0.9rem;color:var(--text);line-height:1.75}

/* ── PROOF ── */
#proof{background:var(--bg2)}
.test-card{background:var(--bg);border:1px solid var(--border);border-left:3px solid var(--green);
  border-radius:22px;padding:36px;margin-top:36px}
.test-stars{color:var(--green);letter-spacing:3px;font-size:0.95rem;margin-bottom:14px}
.test-quote{font-size:1rem;color:var(--text);line-height:1.8;font-style:italic;margin-bottom:22px}
html.light .test-quote{color:#424245}
.test-author{display:flex;align-items:center;gap:15px}
.test-av{width:46px;height:46px;border-radius:50%;background:rgba(34,197,94,0.12);
  border:2px solid var(--green);display:flex;align-items:center;justify-content:center;
  font-family:var(--fh);font-size:1rem;font-weight:700;color:var(--green);flex-shrink:0}
.test-name{font-size:0.95rem;font-weight:600;color:var(--white)}
.test-detail{font-size:0.76rem;color:var(--muted)}
.pilot-bar{margin-top:22px;background:var(--glow2);border:1px solid rgba(34,197,94,0.14);
  border-radius:16px;padding:16px 22px;font-size:0.85rem;color:var(--text);line-height:1.65}
.pilot-bar strong{color:var(--green)}

/* ── BOOK ── */
#book{background:var(--bg)}
.book-wrap{max-width:540px}
.book-title{font-family:var(--fh);font-size:clamp(1.7rem,4vw,2.6rem);font-weight:700;
  color:var(--white);margin-bottom:10px;line-height:1.1;letter-spacing:-0.02em}
.book-sub{font-size:0.93rem;color:var(--text);margin-bottom:30px;line-height:1.7}
.book-options{display:flex;flex-direction:column;gap:12px}
.book-opt{display:flex;align-items:center;gap:16px;padding:20px 24px;
  background:var(--bg2);border:1.5px solid var(--border);border-radius:16px;
  text-decoration:none;transition:border-color 0.2s,background 0.2s,transform 0.2s;color:inherit}
.book-opt:hover{border-color:var(--green);background:var(--glow2);transform:translateX(4px)}
.book-opt:focus-visible{outline:2px solid var(--green);outline-offset:2px}
.book-opt-icon{font-size:1.3rem;flex-shrink:0;width:36px;text-align:center}
.book-opt strong{display:block;font-size:0.95rem;font-weight:600;color:var(--white);margin-bottom:3px}
.book-opt span{font-size:0.8rem;color:var(--muted)}
.founder-strip{margin-top:30px;display:flex;align-items:center;gap:14px;
  background:var(--glow2);border:1px solid rgba(34,197,94,0.12);border-radius:16px;padding:16px 20px}
.founder-av{width:36px;height:36px;border-radius:50%;background:rgba(34,197,94,0.12);
  border:1.5px solid var(--green);display:flex;align-items:center;justify-content:center;
  font-family:var(--fh);font-size:0.88rem;font-weight:700;color:var(--green);flex-shrink:0}
.founder-strip p{font-size:0.82rem;color:var(--text);margin:0;line-height:1.55}
.founder-strip strong{color:var(--white)}

/* ── STICKY ── */
#sticky{display:none;position:fixed;bottom:0;left:0;right:0;z-index:800;
  background:var(--green);padding:13px 24px;text-align:center}
#sticky a{color:#000;font-weight:700;font-size:0.92rem;text-decoration:none}

/* ── FOOTER ── */
footer{border-top:1px solid var(--border);padding:48px 0;background:var(--bg2)}
.footer-inner{text-align:center}
.footer-inner p{font-size:0.76rem;color:var(--muted);line-height:2}

/* ── FADE-UP ANIMATION ── */
.fade-up{opacity:0;transform:translateY(24px);transition:opacity 0.6s ease,transform 0.6s ease}
.fade-up.in{opacity:1;transform:translateY(0)}

/* ── WORD ANIMATION ── */
.word{display:inline-block;opacity:0;animation:wordIn 0.5s forwards}
@keyframes wordIn{to{opacity:1;transform:translateY(0)}}

/* ── RESPONSIVE ── */
@media(max-width:479px){
  section{padding:72px 0}
  h1{font-size:2.6rem;min-height:auto}
  h2{font-size:2rem}
  .price-card{padding:26px}
  .test-card{padding:24px}
  .btn-lg{padding:16px 28px}
  .hero-sub{min-height:auto}
}

/* ── FOUNDER TRUST SECTION ── */
#founder-trust{background:var(--bg2)}
.founder-card{display:flex;flex-direction:column;align-items:center;gap:32px;margin-top:40px;
  background:var(--bg);border:1px solid var(--border);border-radius:24px;padding:36px;text-align:center}

.founder-photo{flex-shrink:0;width:100px;height:100px;border-radius:50%;object-fit:cover;

.founder-info h3{font-size:1.15rem;margin-bottom:8px}
.founder-info p{font-size:0.9rem;line-height:1.75;margin-bottom:18px}
.founder-links{display:flex;flex-wrap:wrap;gap:12px}
.founder-link{display:inline-flex;align-items:center;gap:7px;font-size:0.84rem;font-weight:600;

.founder-link:hover{border-color:var(--green);color:var(--green)}
.founder-av-img{width:36px;height:36px;border-radius:50%;object-fit:cover;
  border:1.5px solid var(--green);flex-shrink:0}

/* ── GLASSMORPHISM / LIQUID GLASS ── */
/* Background gradient orbs — give glass cards visual depth to reflect against */
html.light body::before{content:'';position:fixed;top:-120px;right:-120px;
  width:700px;height:700px;border-radius:50%;pointer-events:none;z-index:-1;
  background:radial-gradient(ellipse,rgba(34,197,94,0.09) 0%,transparent 62%);
  filter:blur(60px);}
html.light body::after{content:'';position:fixed;bottom:-100px;left:-100px;
  width:580px;height:580px;border-radius:50%;pointer-events:none;z-index:-1;
  background:radial-gradient(ellipse,rgba(34,197,94,0.06) 0%,transparent 62%);
  filter:blur(60px);}

/* Liquid glass shimmer keyframe */
@keyframes liquidShimmer{0%{left:-75%;opacity:1}100%{left:125%;opacity:0}}

/* Problem cards — frosted glass */
html.light .prob-item{
  background:rgba(255,255,255,0.62);
  backdrop-filter:blur(18px) saturate(160%);
  -webkit-backdrop-filter:blur(18px) saturate(160%);
  border:1px solid rgba(255,255,255,0.75);
  box-shadow:0 8px 32px rgba(0,0,0,0.06),0 2px 8px rgba(0,0,0,0.03);
  position:relative;overflow:hidden;}
html.light .prob-item::before{content:'';position:absolute;
  top:-50%;left:-75%;width:50%;height:200%;
  background:linear-gradient(105deg,transparent 35%,rgba(255,255,255,0.28) 50%,transparent 65%);
  transform:skewX(-15deg);opacity:0;pointer-events:none;}
html.light .prob-item:hover::before{opacity:1;animation:liquidShimmer 0.65s ease-out forwards;}

/* Price card — deeper glass */
html.light .price-card{
  background:rgba(255,255,255,0.72);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border:1px solid rgba(255,255,255,0.85);
  box-shadow:0 16px 56px rgba(0,0,0,0.07),0 0 0 1px rgba(34,197,94,0.12);
  position:relative;overflow:hidden;}
html.light .price-card::before{content:'';position:absolute;inset:0;border-radius:inherit;
  pointer-events:none;background:linear-gradient(135deg,rgba(255,255,255,0.18) 0%,transparent 55%);}

/* Result / ROI cards */
html.light .result-card{
  background:rgba(255,255,255,0.65);
  backdrop-filter:blur(16px) saturate(160%);
  -webkit-backdrop-filter:blur(16px) saturate(160%);
  border:1px solid rgba(255,255,255,0.8);
  box-shadow:0 4px 16px rgba(0,0,0,0.05);}

/* Testimonial card */
html.light .test-card{
  background:rgba(255,255,255,0.65);
  backdrop-filter:blur(18px) saturate(160%);
  -webkit-backdrop-filter:blur(18px) saturate(160%);
  border:1px solid rgba(255,255,255,0.78);
  box-shadow:0 8px 32px rgba(0,0,0,0.06);
  position:relative;overflow:hidden;}
html.light .test-card::before{content:'';position:absolute;inset:0;border-radius:inherit;
  pointer-events:none;background:linear-gradient(135deg,rgba(255,255,255,0.12) 0%,transparent 50%);}

/* Founder card */
html.light .founder-card{
  background:rgba(255,255,255,0.65);
  backdrop-filter:blur(18px) saturate(160%);
  -webkit-backdrop-filter:blur(18px) saturate(160%);
  border:1px solid rgba(255,255,255,0.78);
  box-shadow:0 8px 32px rgba(0,0,0,0.06);
  position:relative;overflow:hidden;}
html.light .founder-card::before{content:'';position:absolute;inset:0;border-radius:inherit;
  pointer-events:none;background:linear-gradient(135deg,rgba(255,255,255,0.14) 0%,transparent 55%);}

/* Book options — glass */
html.light .book-opt{
  background:rgba(255,255,255,0.62);
  backdrop-filter:blur(16px) saturate(160%);
  -webkit-backdrop-filter:blur(16px) saturate(160%);
  border:1.5px solid rgba(255,255,255,0.75);
  box-shadow:0 4px 20px rgba(0,0,0,0.05);
  position:relative;overflow:hidden;}
html.light .book-opt::before{content:'';position:absolute;inset:0;border-radius:inherit;
  pointer-events:none;background:linear-gradient(135deg,rgba(255,255,255,0.14) 0%,transparent 55%);
  opacity:0;transition:opacity 0.3s;}
html.light .book-opt:hover::before{opacity:1;}

/* Math grid — glass surface */
html.light .math-grid{
  border-color:rgba(255,255,255,0.7);
  background:rgba(255,255,255,0.55);
  backdrop-filter:blur(18px) saturate(160%);
  -webkit-backdrop-filter:blur(18px) saturate(160%);
  box-shadow:0 8px 32px rgba(0,0,0,0.05);}

/* Chat widget — glass tint in light */
html.light .chat-wrap{
  background:rgba(240,240,243,0.72);
  backdrop-filter:blur(16px) saturate(150%);
  -webkit-backdrop-filter:blur(16px) saturate(150%);}

/* Hero card row stats */
html.light .hero-card-row{background:rgba(250,250,252,0.7);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
html.light .hc-item{background:transparent;}

/* ── AD SPEND PROTECTION CALLOUT ── */
.ad-spend-hook{display:flex;align-items:flex-start;gap:14px;
  margin-top:28px;padding:18px 22px;

.ad-spend-hook .asi{font-size:1.4rem;flex-shrink:0;margin-top:2px}
.ad-spend-hook p{font-size:0.88rem;color:var(--text);line-height:1.65;margin:0}
.ad-spend-hook strong{color:var(--white)}

.yt-embed{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;

.yt-embed iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0}
.yt-caption{text-align:center;font-size:0.82rem;color:var(--muted);margin-top:12px}

/* ── LIGHT FIXES ── */
html.light .phone-frame{background:#111;border-color:#555}
html.light .phone-screen{background:#050505}
html.light .chat-wrap{background:#f0f0f0;border-color:#ddd}

/* ── PREMIUM LIGHT THEME REFINEMENTS ── */

html.light .test-card{background:#ffffff;box-shadow:0 4px 24px rgba(0,0,0,0.04)}
html.light .prob-item{background:#ffffff;box-shadow:0 2px 16px rgba(0,0,0,0.04)}

/* ── HERO GRADIENT (premium depth) ── */
#hero{background:radial-gradient(ellipse 90% 55% at 50% -5%,rgba(34,197,94,0.08) 0%,transparent 65%)}
html.light #hero{background:radial-gradient(ellipse 90% 55% at 50% -5%,rgba(34,197,94,0.05) 0%,transparent 65%)}

/* ── FLOAT ANIMATION (phone widget) ── */
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-11px)}}
.phone-wrap{animation:floatY 6.5s ease-in-out infinite}

/* ── PREMIUM FADE-UP (blur + slide) ── */
.fade-up{opacity:0;transform:translateY(28px);filter:blur(4px);
  transition:opacity 0.75s cubic-bezier(0.16,1,0.3,1),transform 0.75s cubic-bezier(0.16,1,0.3,1),filter 0.75s cubic-bezier(0.16,1,0.3,1)}
.fade-up.in{opacity:1;transform:translateY(0);filter:blur(0)}

/* ── STEP STAGGER (when parent .fade-up gets .in) ── */
.steps .step{opacity:0;transform:translateX(-14px);
  transition:opacity 0.6s cubic-bezier(0.16,1,0.3,1),transform 0.6s cubic-bezier(0.16,1,0.3,1)}
.steps.in .step{opacity:1;transform:translateX(0)}
.steps.in .step:nth-child(2){transition-delay:0.09s}
.steps.in .step:nth-child(3){transition-delay:0.18s}
.steps.in .step:nth-child(4){transition-delay:0.27s}

/* ── PROB CARD STAGGER ── */
.problem-grid .prob-item{opacity:0;transform:translateY(16px);
  transition:opacity 0.55s cubic-bezier(0.16,1,0.3,1),transform 0.55s cubic-bezier(0.16,1,0.3,1),box-shadow 0.35s ease}
.problem-grid.in .prob-item{opacity:1;transform:translateY(0)}
.problem-grid.in .prob-item:nth-child(2){transition-delay:0.1s}
.problem-grid.in .prob-item:nth-child(3){transition-delay:0.2s}

/* ── CARD SPRING HOVER ── */
/* Override the basic hover defined earlier with a spring effect */
.prob-item:hover{transform:translateY(-6px) scale(1.025);box-shadow:0 20px 60px rgba(0,0,0,0.2)}
html.light .prob-item:hover{box-shadow:0 20px 60px rgba(0,0,0,0.08)}

/* ── CTA BUTTON GLOW PULSE ── */
@keyframes ctaPulse{0%,100%{box-shadow:0 4px 20px rgba(34,197,94,0.2)}50%{box-shadow:0 4px 32px rgba(34,197,94,0.45)}}
html.light .btn-primary{animation:ctaPulse 3s ease-in-out infinite}
html.light .btn-primary:hover{animation:none;box-shadow:0 6px 28px rgba(34,197,94,0.5)}

/* ── TRADE IMAGE STRIP ── */
section#trades{padding:0;border-top:none}
.trades-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:0;overflow:hidden}
@media(max-width:640px){.trades-strip{grid-template-columns:repeat(2,1fr)}}
.trade-img-wrap{position:relative;overflow:hidden;aspect-ratio:4/3}
.trade-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;filter:brightness(0.75) saturate(0.85);transition:transform 0.75s cubic-bezier(0.16,1,0.3,1),filter 0.5s ease}
.trade-img-wrap:hover img{transform:scale(1.07);filter:brightness(0.92) saturate(1.1)}
.trade-img-lbl{position:absolute;bottom:0;left:0;right:0;padding:36px 18px 16px;background:linear-gradient(transparent,rgba(0,0,0,0.72));font-family:var(--fh);font-size:0.78rem;font-weight:700;color:#fff;letter-spacing:0.14em;text-transform:uppercase;pointer-events:none}

/* ── SHOWCASE IMAGE ── */
.showcase-img-wrap{position:relative;overflow:hidden;max-height:500px;line-height:0}
/* brightness(0.35) ensures white text (#fff) meets WCAG AA contrast (>4.5:1) against darkened image */
.showcase-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;filter:brightness(0.35) saturate(0.75);transition:transform 10s ease}
.showcase-img-wrap:hover img{transform:scale(1.03)}
.showcase-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:48px 24px}
.showcase-quote{font-family:var(--fh);font-size:clamp(1.5rem,4vw,2.6rem);font-weight:700;color:#ffffff;text-align:center;line-height:1.2;letter-spacing:-0.025em;max-width:680px;text-shadow:0 2px 20px rgba(0,0,0,0.4)}
.showcase-quote span{color:#4ade80}

/* ── TERMINAL WIDGET ── */
.term-wrap{background:#0a0a0a;border:1.5px solid #2d2d2d;border-radius:12px;overflow:hidden;
  box-shadow:0 0 60px rgba(34,197,94,0.1),0 24px 60px rgba(0,0,0,0.6);max-width:480px;font-family:'Courier New',Courier,monospace}
.term-bar{background:#1c1c1e;padding:10px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #2d2d2d}
.term-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.term-dot.red{background:#ff5f56}
.term-dot.yellow{background:#ffbd2e}
.term-dot.green{background:#27c93f}
.term-title{flex:1;text-align:center;font-size:0.7rem;color:#888;letter-spacing:0.05em}
.term-body{padding:18px 20px;min-height:280px}
.term-line{display:block;font-size:0.78rem;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.term-cmd{color:#4ade80}
.term-comment{color:#555}
.term-label{color:#f59e0b}
.term-value{color:#e2e8f0}
.term-accent{color:#22c55e;font-weight:700}
.term-cursor{display:inline-block;width:8px;height:14px;background:#22c55e;
  vertical-align:middle;animation:blink 1s step-end infinite;margin-left:2px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.term-opener{color:#86efac;font-style:italic}

/* ── PRICING GRID (3 cards) ── */

html.light .pc-badge{color:#fff}

<script>
/* ── THEME ── */
(function(){
  var html=document.documentElement,btn=document.getElementById('themeBtn'),
      meta=document.querySelector('meta[name="theme-color"]');
  function apply(t){
    if(t==='light'){html.classList.add('light');if(meta)meta.setAttribute('content','#ffffff');}
    else{html.classList.remove('light');if(meta)meta.setAttribute('content','#080808');}
  }
  var s=localStorage.getItem('bt');
  if(s==='dark')apply('dark');
  else apply('light');
  if(btn)btn.addEventListener('click',function(){
    var n=html.classList.contains('light')?'dark':'light';
    apply(n);localStorage.setItem('bt',n);
  });
})();

/* ── HERO WORD ANIMATION — runs after fonts load to prevent CLS ── */
(function(){
  function animateWords(){
    ['.h1-l1','.h1-l2','.h1-l3'].forEach(function(sel,si){
      var el=document.querySelector(sel);
      if(!el)return;
      /* save text before destroying it */
      var txt=el.textContent.trim();
      var words=txt.split(/\s+/);
      el.innerHTML='';
      words.forEach(function(w,i){
        var s=document.createElement('span');
        s.className='word';
        s.textContent=w;
        s.style.animationDelay=(150+si*180+i*80)+'ms';
        el.appendChild(s);
        /* add space between words */
        if(i<words.length-1)el.appendChild(document.createTextNode('\u00a0'));
      });
    });
  }
  /* wait for fonts to avoid measuring shift */
  if(document.fonts&&document.fonts.ready){
    document.fonts.ready.then(animateWords);
  } else {
    /* fallback: slight delay so paint happens first */
    setTimeout(animateWords,200);
  }
})();

/* ── FADE-UP ── */
(function(){
  var els=document.querySelectorAll('.fade-up');
  if(!('IntersectionObserver' in window)){
    els.forEach(function(e){e.classList.add('in')});return;
  }
  var obs=new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){e.target.classList.add('in');obs.unobserve(e.target);}
    });
  },{threshold:0.1,rootMargin:'0px 0px -40px 0px'});
  els.forEach(function(e){obs.observe(e)});
})();

/* ── SMOOTH SCROLL ── */
document.querySelectorAll('a[href^="#"]').forEach(function(a){
  a.addEventListener('click',function(e){
    var t=document.querySelector(this.getAttribute('href'));
    if(t){e.preventDefault();t.scrollIntoView({behavior:'smooth',block:'start'});}
  });
});

/* ── STICKY BAR ── */
(function(){
  var bar=document.getElementById('sticky');if(!bar)return;
  var bookEl=document.getElementById('book');
  window.addEventListener('scroll',function(){
    var ratio=window.scrollY/(document.body.scrollHeight-window.innerHeight)||0;
    var bookInView=bookEl&&bookEl.getBoundingClientRect().top<window.innerHeight;
    if(ratio>0.52&&!bookInView){
      bar.style.display='block';
      document.body.style.paddingBottom='46px';
    }else{
      bar.style.display='none';
      document.body.style.paddingBottom='0';
    }
  },{passive:true});
})();

/* ── FAQ ── */
function toggleFaq(btn){
  var item=btn.parentElement;
  var isOpen=item.classList.contains('open');
  document.querySelectorAll('.faq-item.open').forEach(function(i){
    i.classList.remove('open');
    i.querySelector('.faq-q').setAttribute('aria-expanded','false');
  });
  if(!isOpen){
    item.classList.add('open');
    btn.setAttribute('aria-expanded','true');
  }
}
<\/script>
