<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breculia AI | Industry Voice Agents</title>
  <meta name="description" content="Breculia AI deploys voice agents built for your industry." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#f7f8f8;--card:#ffffff;--text:#111111;--muted:#5f6368;--accent:#1D9E75;--border:#e5e7eb;color-scheme:light}
    html.dark{--bg:#0f0f0f;--card:#171717;--text:#f0f0f0;--muted:#a0a0a0;--accent:#1D9E75;--border:#2a2a2a;color-scheme:dark}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{min-height:100vh;display:grid;place-items:center;padding:24px}
    .panel{width:min(920px,100%);text-align:center}
    h1{font-size:clamp(1.9rem,4vw,3rem);margin:0 0 12px}
    p{margin:0 0 32px;color:var(--muted)}
    .choices{display:grid;grid-template-columns:1fr;gap:16px}
    .btn{display:block;padding:22px 18px;border:1px solid var(--border);border-radius:14px;background:var(--card);color:var(--text);text-decoration:none;font-weight:700;transition:.2s ease}
    .btn:hover{transform:translateY(-2px);border-color:var(--accent);box-shadow:0 8px 24px rgba(0,0,0,.12)}
    .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
    .footer{margin-top:28px;font-size:.88rem;color:var(--muted)}
    .theme{position:fixed;top:16px;right:16px;border:1px solid var(--border);background:var(--card);color:var(--text);border-radius:999px;padding:8px 12px;cursor:pointer}
    @media (min-width:760px){.choices{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <button class="theme" id="themeToggle" aria-label="Toggle theme">☀️/🌙</button>
  <main class="wrap">
    <section class="panel">
      <h1>Who are you building for?</h1>
      <p>Breculia AI deploys voice agents built for your industry.</p>
      <div class="choices">
        <a class="btn primary" href="./legal/">Immigration Law Firm</a>
        <a class="btn" href="./hserv/">Home Service Contractor</a>
      </div>
      <div class="footer">Breculia AI · founder@breculia.tech · breculia.tech</div>
    </section>
  </main>
  <script>
    (function(){
      var key='breculia-theme';
      var saved=localStorage.getItem(key);
      if(saved==='dark'){document.documentElement.classList.add('dark');}
      var btn=document.getElementById('themeToggle');
      btn.addEventListener('click',function(){
        document.documentElement.classList.toggle('dark');
        localStorage.setItem(key,document.documentElement.classList.contains('dark')?'dark':'light');
      });
    })();
  </script>
</body>
</html>
